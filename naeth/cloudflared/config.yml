# Tunel Cloudflare de Naeth (Paso 7 §7, Fase 4). Publica SOLO el endpoint del proceso
# (visor + MCP + OAuth) en 127.0.0.1:8800 como naeth-local.enraxk.dev.
# No toca el tunel `enraxk` (otro tunel de la cuenta). credentials-file es local a este
# equipo (generado por `cloudflared tunnel create`); NO se commitea el .json.
tunnel: 7d283520-1af7-48c7-8708-48933132b5ef
credentials-file: C:\Users\eneki\.cloudflared\7d283520-1af7-48c7-8708-48933132b5ef.json

ingress:
  # SEGURIDAD (2026-07-07): el visor (/) y la API de datos (/api/*) estaban ABIERTOS a internet
  # sin auth por el tunel (solo /mcp iba protegido por OAuth). TAPON al edge: 404 para /api y /.
  # En local siguen accesibles por 127.0.0.1:8800. /mcp y las rutas OAuth siguen publicas.
  # (Solucion de fondo pendiente: docs/investigacion-seguridad-centralizacion.md)
  - hostname: naeth-local.enraxk.dev
    path: ^/api
    service: http_status:404
  - hostname: naeth-local.enraxk.dev
    path: ^/$
    service: http_status:404
  - hostname: naeth-local.enraxk.dev
    service: http://127.0.0.1:8800
  - service: http_status:404
