<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naeth · visor</title>
<style>
  /* ===== Design DNA "Terminal × Notion" · tokens dark/light ===== */
  :root{
    --mono:ui-monospace,"JetBrains Mono",SFMono-Regular,Menlo,monospace;
    --body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --sp1:4px; --sp2:8px; --sp3:12px; --sp4:16px; --sp6:24px;
    color-scheme:light dark;
  }
  :root[data-theme="dark"]{
    --bg:#0d0f12; --bg2:#0b0d10; --panel:#15181d; --border:#262b33;
    --ink:#e6e8eb; --dim:#8a929e; --accent:#5db0ff; --sel:#17222e;
    --ok:#46c98b; --warn:#e0a64b;
  }
  :root[data-theme="light"]{
    --bg:#f7f7f5; --bg2:#efefec; --panel:#ffffff; --border:#e3e3df;
    --ink:#1f2329; --dim:#6b7280; --accent:#2563eb; --sel:#e7f0fb;
    --ok:#15803d; --warn:#b45309;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 var(--body);
    display:flex;flex-direction:column;overflow:hidden}
  .mono{font-family:var(--mono)}
  svg{display:block}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

  /* ===== Scrollbar custom (Terminal × Notion, adapta al tema) ===== */
  *{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;
    border:3px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--dim);background-clip:padding-box}
  ::-webkit-scrollbar-corner{background:transparent}

  /* ===== Header ===== */
  header{display:flex;align-items:center;gap:var(--sp4);padding:10px 16px;
    background:var(--panel);border-bottom:1px solid var(--border);flex:0 0 auto}
  .h-left,.h-right{flex:1 1 0;display:flex;align-items:center;min-width:0}
  .h-right{justify-content:flex-end;gap:var(--sp2)}
  .brand{display:flex;align-items:center;gap:14px;min-width:0}
  .wordmark{font:600 15px var(--mono);letter-spacing:1.5px;color:var(--ink);padding:2px 0}
  .wordmark:hover{color:var(--accent)}
  .pill{font:11px var(--mono);color:var(--dim);border:1px solid var(--border);
    padding:3px 8px;border-radius:4px;white-space:nowrap}
  .search{flex:0 0 440px;max-width:46vw;display:flex;align-items:center;gap:8px;position:relative;
    background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px}
  .searchpop{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
    width:560px;max-width:92vw;max-height:60vh;overflow:auto;z-index:50;
    background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:6px;
    box-shadow:0 12px 32px rgba(0,0,0,.45)}
  .searchpop[hidden]{display:none}
  .pop-hint{font:11px var(--mono);color:var(--dim);padding:8px 10px}
  .qitem{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    padding:8px 10px;border-radius:6px;color:var(--ink)}
  .qitem:hover,.qitem.active{background:var(--sel)}
  .qitem .qt{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:13px var(--body)}
  .qitem .qp{flex:0 0 auto;font:11px var(--mono);color:var(--dim);max-width:46%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .search:focus-within{border-color:var(--accent)}
  .search input{flex:1 1 auto;min-width:0;background:none;border:0;color:var(--ink);
    font:13px var(--mono);outline:none}
  .search input::placeholder{color:var(--dim)}
  .kbd{font:10px var(--mono);color:var(--dim);border:1px solid var(--border);
    border-radius:3px;padding:1px 6px}
  .iconbtn{display:flex;align-items:center;justify-content:center;padding:6px;
    border:1px solid var(--border);border-radius:6px;color:var(--dim)}
  .iconbtn:hover{color:var(--ink);border-color:var(--accent)}

  /* ===== Body grid ===== */
  .body{flex:1 1 auto;display:grid;grid-template-columns:var(--side-w,288px) 1fr 48px;min-height:0}

  /* ===== Rail de navegación (icon bar a la derecha, estilo VS Code) ===== */
  .railbar{background:var(--bg2);border-left:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0}
  .rail-item{display:flex;align-items:center;justify-content:center;width:40px;height:40px;
    border-radius:8px;color:var(--dim);position:relative}
  .rail-item:hover{color:var(--ink);background:color-mix(in srgb,var(--ink) 8%,transparent)}
  .rail-item.on{color:var(--accent)}
  .rail-item.on::before{content:"";position:absolute;right:-10px;top:8px;bottom:8px;width:2px;
    background:var(--accent);border-radius:2px}
  .rail-spacer{flex:1 1 auto}

  .sidebar{background:var(--bg2);border-right:1px solid var(--border);position:relative;
    display:flex;flex-direction:column;min-height:0}
  .resizer{position:absolute;top:0;right:-3px;width:6px;height:100%;z-index:6;cursor:col-resize}
  .resizer.drag{background:var(--accent);opacity:.45}
  .center{display:flex;flex-direction:column;min-width:0;min-height:0}
  .detail{background:var(--bg);overflow:auto;min-width:0;flex:1 1 auto}

  /* ===== Breadcrumbs (ruta de la vista, barra fija) ===== */
  .crumbs{flex:0 0 auto;display:flex;align-items:center;gap:5px;flex-wrap:wrap;
    min-height:40px;padding:8px 16px;border-bottom:1px solid var(--border);
    background:var(--bg);font:12px var(--mono);color:var(--dim)}
  .crumb{display:inline-flex;align-items:center;gap:5px;color:var(--dim);
    padding:2px 5px;border-radius:5px;max-width:42ch;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  button.crumb:hover{color:var(--ink);background:color-mix(in srgb,var(--ink) 7%,transparent)}
  .crumb.cur{color:var(--ink)}
  .crumb-sep{display:inline-flex;align-items:center;color:var(--border)}

  .sect-head{display:flex;justify-content:space-between;align-items:center;
    padding:11px 14px;border-bottom:1px solid var(--border);
    font:11px var(--mono);letter-spacing:1px;color:var(--dim);text-transform:uppercase}

  /* ===== Tree ===== */
  .tree-tools{display:flex;justify-content:flex-end;padding:6px 8px 0;flex:0 0 auto}
  .sortbtn{display:flex;align-items:center;gap:6px;font:10px var(--mono);letter-spacing:.5px;
    color:var(--dim);text-transform:uppercase;padding:4px 8px;border-radius:6px;border:1px solid var(--border)}
  .sortbtn:hover{color:var(--ink);border-color:var(--accent)}
  #tree{overflow:auto;padding:6px;flex:1 1 auto}
  .row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;
    width:100%;text-align:left;color:var(--ink);line-height:1.3}
  .row:hover{background:color-mix(in srgb,var(--ink) 6%,transparent)}
  .row .chev{flex:0 0 auto;color:var(--dim);transition:transform .12s}
  .group.collapsed > .row .chev{transform:rotate(-90deg)}
  .group.collapsed > .children{display:none}
  .row .label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .rdate{display:none;margin-left:auto;flex:0 0 auto;padding-left:8px;
    font:10px var(--mono);color:var(--dim);white-space:nowrap}
  .row:hover .rdate{display:block}
  .row.proj .label{font:600 12px var(--mono)}
  .row.origin .label{font:12px var(--mono);color:var(--dim)}
  .row.leaf .label{font:13px var(--body);flex:1 1 auto}
  .row.leaf.sel{background:var(--sel);box-shadow:inset 2px 0 0 var(--accent)}
  .children{display:flex;flex-direction:column;gap:1px}
  .indent{margin-left:16px;border-left:1px solid var(--border);padding-left:6px;
    display:flex;flex-direction:column;gap:1px}
  .ico{flex:0 0 auto}

  /* ===== Detail ===== */
  .detail-wrap{padding:28px 40px;max-width:840px}
  .d-title{font:600 24px var(--body);margin:0 0 14px}
  .d-meta{display:flex;flex-wrap:wrap;align-items:center;gap:10px;font:12px var(--mono);
    color:var(--dim);margin-bottom:12px}
  .d-meta .sep{color:var(--border)}
  .d-type{display:inline-flex;align-items:center;gap:5px}
  .d-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
  .tag{font:11px var(--mono);color:var(--dim);border:1px solid var(--border);
    border-radius:4px;padding:2px 8px}
  .d-body{font:14px/1.65 var(--body);white-space:pre-wrap;word-wrap:break-word}
  .hist{margin-top:24px}
  .hist-head{display:flex;align-items:center;gap:10px;font:11px var(--mono);
    letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-bottom:12px}
  .hist-head .line{flex:1 1 auto;height:1px;background:var(--border)}
  .timeline{border-left:1px solid var(--border);padding-left:8px;
    display:flex;flex-direction:column;gap:8px}
  .ver{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:5px 8px;border-radius:6px;width:100%;text-align:left;font:12px var(--mono);
    color:var(--dim)}
  .ver:hover{background:color-mix(in srgb,var(--ink) 6%,transparent)}
  .ver.cur{background:var(--sel);color:var(--ink)}
  .ver .vg{display:flex;align-items:center;gap:10px}
  .dot{flex:0 0 auto;width:9px;height:9px;border-radius:50%;border:2px solid var(--dim)}
  .ver.cur .dot{background:var(--accent);border-color:var(--accent)}
  .empty{color:var(--dim);font:13px var(--body);padding:28px 40px}

  /* ===== Inicio (dashboard, sin cajas) ===== */
  .inicio{padding:48px 56px;max-width:880px}
  .hero{margin-bottom:38px}
  .hello{font:600 30px var(--body);margin:0 0 8px}
  .lede{font:13px var(--mono);color:var(--dim);margin:0}
  .lede b{color:var(--ink);font-weight:600}
  .sec-title{font:11px var(--mono);letter-spacing:1px;color:var(--dim);
    text-transform:uppercase;margin-bottom:6px}
  .recent-list{display:flex;flex-direction:column}
  .recent-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    padding:11px 12px;border-radius:8px;color:var(--ink)}
  .recent-item:hover{background:color-mix(in srgb,var(--ink) 6%,transparent)}
  .ri-main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:2px}
  .ri-title{font:14px var(--body);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ri-path{font:11px var(--mono);color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ri-date{flex:0 0 auto;font:11px var(--mono);color:var(--dim)}

  /* ===== Estado del nodo ===== */
  .estado{padding:40px 48px;max-width:1040px}
  .est-conn{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:30px}
  .est-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;background:var(--ok);
    box-shadow:0 0 0 3px color-mix(in srgb,var(--ok) 22%,transparent)}
  .est-dot.bad{background:var(--warn);box-shadow:0 0 0 3px color-mix(in srgb,var(--warn) 22%,transparent)}
  .est-state{font:600 22px var(--body)}
  .est-sub{flex-basis:100%;font:12px var(--mono);color:var(--dim)}
  .est-sec{margin-bottom:26px}
  .est-sec-head{display:flex;align-items:center;gap:7px;font:11px var(--mono);letter-spacing:1px;
    text-transform:uppercase;color:var(--dim);margin-bottom:12px}
  .est-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .est-tile{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:15px 16px;display:flex;flex-direction:column;gap:7px}
  .est-tile .v{font:600 26px var(--mono);color:var(--ink);line-height:1}
  .est-tile .v.ok{color:var(--ok)} .est-tile .v.warn{color:var(--warn)}
  .est-tile .k{font:10px var(--mono);letter-spacing:.5px;text-transform:uppercase;color:var(--dim)}
  .est-emb{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:16px 18px;display:flex;flex-direction:column;gap:10px}
  .est-bar{height:8px;border-radius:99px;background:var(--bg2);border:1px solid var(--border);overflow:hidden}
  .est-bar > i{display:block;height:100%;background:var(--ok);transition:width .4s ease}
  .est-emb-meta{display:flex;align-items:baseline;gap:10px}
  .est-emb-meta .v{font:600 18px var(--mono);color:var(--ink)} .est-emb-meta .v.ok{color:var(--ok)}
  .est-emb-meta .k{font:12px var(--mono);color:var(--dim)}
  /* charts */
  .charts{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .chart{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
  .chart h3{font:11px var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--dim);
    margin:0 0 14px;display:flex;align-items:center;gap:7px}
  .bar-row{display:grid;grid-template-columns:minmax(80px,140px) 1fr 34px;align-items:center;
    gap:10px;margin-bottom:9px}
  .bar-row:last-child{margin-bottom:0}
  .bar-label{display:flex;align-items:center;gap:7px;font:12px var(--body);color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{height:8px;border-radius:99px;background:var(--bg2);overflow:hidden}
  .bar-fill{display:block;height:100%;border-radius:99px;min-width:3px}
  .bar-val{font:11px var(--mono);color:var(--dim);text-align:right}
  .chart h3 .chart-sub{margin-left:auto;font:10px var(--mono);letter-spacing:0;
    text-transform:none;color:var(--dim)}
  .spark{display:flex;align-items:stretch;gap:6px;height:130px}
  .spark .day{flex:1 1 0;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
  .spark .day .n{font:10px var(--mono);color:var(--ink);min-height:13px;line-height:1}
  .spark .day .barwrap{flex:1 1 auto;width:100%;display:flex;align-items:flex-end;justify-content:center;
    border-bottom:1px solid var(--border)}
  .spark .day .bar{width:100%;max-width:30px;background:var(--accent);border-radius:4px 4px 0 0;
    min-height:2px;opacity:.85}
  .spark .day:hover .bar{opacity:1}
  .spark .day.empty .bar{background:var(--border)}
  .spark .day .x{font:10px var(--mono);color:var(--dim);line-height:1}

  /* ===== Vista-esqueleto (próximamente) ===== */
  .stub{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100%;gap:14px;color:var(--dim);text-align:center;padding:48px}
  .stub .si{opacity:.45}
  .stub h2{font:600 18px var(--body);color:var(--ink);margin:0}
  .stub p{margin:0;font:13px/1.6 var(--body);max-width:380px}
  .stub .soon{font:10px var(--mono);letter-spacing:1px;text-transform:uppercase;
    border:1px solid var(--border);border-radius:99px;padding:3px 10px}

  /* ===== Rail: estado + resultados ===== */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 14px 8px}
  .stat{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px}
  .stat .n{font:600 22px var(--mono)}
  .stat .n.ok{color:var(--ok)}
  .stat .l{font:10px var(--mono);letter-spacing:.5px;color:var(--dim);text-transform:uppercase}
  .queue{padding:6px 14px 16px;border-bottom:1px solid var(--border);
    display:flex;flex-direction:column;gap:8px}
  .queue .ql{font:11px var(--mono);color:var(--dim)}
  .qpills{display:flex;gap:6px;flex-wrap:wrap}
  .qpill{font:10px var(--mono);border:1px solid var(--dim);color:var(--dim);
    border-radius:4px;padding:2px 7px}
  .qpill.ok{border-color:var(--ok);color:var(--ok)}
  .qpill.warn{border-color:var(--warn);color:var(--warn)}
  #results{overflow:auto;padding:8px}
  .hit{display:block;width:100%;text-align:left;border-radius:6px;padding:8px 10px;
    border-left:2px solid transparent;color:var(--ink)}
  .hit:hover{background:color-mix(in srgb,var(--ink) 6%,transparent)}
  .hit.sel{background:var(--sel)}
  .hit .t{font:600 13px var(--body);display:flex;align-items:center;gap:8px}
  .hit .s{font:12px/1.4 var(--body);color:var(--dim);margin-top:2px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hit .m{font:10px var(--mono);color:var(--dim);margin-top:3px}

  /* ===== Statusbar (estado compactado aquí) ===== */
  footer{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;gap:16px;
    padding:6px 16px;background:var(--panel);border-top:1px solid var(--border);
    font:11px var(--mono);color:var(--dim)}
  #sbStats{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
  #sbStats b{color:var(--ink);font-weight:600}
  #sbStats .ok{color:var(--ok)} #sbStats .warn{color:var(--warn)}
  #sbStats .sep{color:var(--border)}
  .sb-right{display:flex;align-items:center;gap:16px;flex:0 0 auto}
  .health{display:flex;align-items:center;gap:6px;color:var(--ok)}
  .health.bad{color:var(--warn)}
  .toggle{display:flex;align-items:center;gap:2px;border:1px solid var(--border);
    border-radius:5px;padding:2px}
  .toggle .seg{display:flex;align-items:center;justify-content:center;padding:3px 7px;
    border-radius:4px;color:var(--dim)}
  .toggle .seg.on{background:var(--sel);color:var(--accent)}

  /* ===== Responsive ===== */
  @media (max-width:900px){
    .body{grid-template-columns:1fr 44px;grid-template-rows:auto 1fr;overflow:auto}
    .railbar{grid-column:2;grid-row:1 / 3}
    .sidebar{grid-column:1;border-right:0;border-bottom:1px solid var(--border);max-height:40vh}
    .center{grid-column:1}
    .inicio,.estado{padding:28px 22px}
    .search{flex-basis:auto;max-width:none}
    .detail-wrap{padding:20px}
    .row,.ver{padding-top:11px;padding-bottom:11px}
    .toggle .seg{padding:10px 12px}
    .iconbtn{padding:11px}
    footer{flex-wrap:wrap}
    .resizer{display:none}
  }
</style>
</head>
<body>
<header>
  <div class="h-left">
    <div class="brand">
      <button class="wordmark" id="brand" title="Ir al inicio" aria-label="Ir al inicio">NAETH</button>
      <span class="pill" id="model">modelo: …</span>
    </div>
  </div>
  <form class="search" id="searchForm" role="search">
    <span class="ico" id="searchIco"></span>
    <input id="q" type="search" placeholder="buscar memoria…  ·  @tipo  #tag  /proyecto"
           aria-label="Buscar memoria" autocomplete="off" role="combobox"
           aria-expanded="false" aria-controls="searchPop">
    <span class="kbd" aria-hidden="true">/</span>
    <div id="searchPop" class="searchpop" role="listbox" aria-label="Resultados" hidden></div>
  </form>
  <div class="h-right">
    <button class="iconbtn" id="refresh" title="Refrescar" aria-label="Refrescar"></button>
  </div>
</header>

<div class="body">
  <nav class="sidebar" aria-label="Árbol de memorias">
    <div class="tree-tools">
      <button id="sortBtn" class="sortbtn" title="Cambiar orden" aria-label="Cambiar orden del árbol"></button>
    </div>
    <div id="tree" role="tree" aria-label="Memorias por proyecto"></div>
    <div class="resizer" id="resizer" title="Arrastra para redimensionar"></div>
  </nav>

  <section class="center">
    <nav class="crumbs" id="crumbs" aria-label="Ruta"></nav>
    <main class="detail" id="detail">
      <div class="empty">Selecciona una memoria del árbol para verla aquí.</div>
    </main>
  </section>

  <nav class="railbar" id="rail" aria-label="Navegación entre vistas"></nav>
</div>

<footer>
  <div id="sbStats" class="mono">cargando…</div>
  <div class="sb-right">
    <span class="health" id="health"><span class="ico"></span><span>conectado</span></span>
  </div>
</footer>

<script>
const $ = s => document.querySelector(s);
const api = async (u,o) => (await fetch(u, {cache:"no-store", ...o})).json();

/* ===== Iconos SVG (lucide, inline · zero-build) ===== */
const P = {
  "chevron-down":'<path d="M6 9l6 6 6-6"/>',
  "chevron-right":'<path d="M9 18l6-6-6-6"/>',
  "folder":'<path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.7-.9l-.8-1.2A2 2 0 0 0 7.9 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>',

/* ===== Árbol ===== */
let treeData = null;
let collapsed;
try { collapsed = new Set(JSON.parse(localStorage.getItem("naeth-collapsed")||"[]")); }
catch(_) { collapsed = new Set(); }
function saveCollapsed(){ try{ localStorage.setItem("naeth-collapsed", JSON.stringify([...collapsed])); }catch(_){} }
// ramas abiertas automáticamente por el "reveal" (se vuelven a cerrar al ir a Inicio)
let autoExpanded = new Set();
// Fechas en el formato regional del sistema (Windows): locale por defecto (undefined).
const fmtDate  = iso => iso ? new Date(iso).toLocaleString(undefined,{dateStyle:"medium", timeStyle:"short"}) : "";
const fmtShort = iso => iso ? new Date(iso).toLocaleString(undefined,{dateStyle:"short",  timeStyle:"short"}) : "";
const fmtDay   = iso => iso ? new Date(iso).toLocaleDateString(undefined,{dateStyle:"short"}) : "";
// Árbol: la fecha (día + hora) solo se muestra al pasar el ratón por la fila.
const rdateHtml = iso => iso ? `<span class="rdate">${fmtShort(iso)}</span>` : "";

async function loadTree(){
  let data;
  try { data = await api("/api/tree"); } catch(_) { return; }   // no pisar datos buenos si falla
  if(Array.isArray(data)) treeData = data;
  renderTree();
  const r = parseHash();
  if(r.view==="inicio") renderInicio();                              // poblar "actividad reciente"
  else if(r.view==="estado") renderEstado();                         // refrescar gráficos
  else if(r.view==="memoria" && currentId)
    revealInTree((treeData||[]).find(x=> x.id===currentId));         // enlace directo: desplegar rama
}
let sortMode = localStorage.getItem("naeth-sort") || "az";   // az | date-desc | date-asc
function cmpDate(da,db){ return String(da||"").localeCompare(String(db||"")); }
function groupDate(arr){
  // fecha representativa del grupo: la más nueva (date-desc) o la más antigua (date-asc)
  return arr.map(x=>String(x.created_at||"")).reduce((acc,d)=>
    sortMode==="date-asc" ? (acc===""||d<acc?d:acc) : (d>acc?d:acc), "");
}
function orderCmp(nameA,nameB,dateA,dateB){
  if(sortMode==="az") return String(nameA).localeCompare(String(nameB),"es",{sensitivity:"base"});
  return (sortMode==="date-asc"?1:-1) * cmpDate(dateA,dateB);
}
function sortLeaves(arr){
  arr.sort((a,b)=> sortMode==="az"
    ? String(a.title||"").localeCompare(String(b.title||""),"es",{sensitivity:"base"})
    : (sortMode==="date-asc"?1:-1)*cmpDate(a.created_at,b.created_at));
  return arr;
}
function buildTree(rows){
  const pm = new Map();
  for(const m of rows){
    const parts = (m.path || "(sin path)").split("/");
    const proj = parts[0] || "(sin path)", origin = parts[1] || "·";
    if(!pm.has(proj)) pm.set(proj, new Map());
    const om = pm.get(proj);
    if(!om.has(origin)) om.set(origin, []);
    om.get(origin).push(m);
  }
  const maxDate = arr => arr.reduce((mx,x)=>{const d=String(x.created_at||"");return d>mx?d:mx;}, "");
  const projects = [];
  for(const [proj, om] of pm){
    const origins = []; let all = [];
    for(const [origin, leaves] of om){
      sortLeaves(leaves); all = all.concat(leaves);
      origins.push({origin, leaves, d:groupDate(leaves), mod:maxDate(leaves)});
    }
    origins.sort((a,b)=> orderCmp(a.origin,b.origin,a.d,b.d));
    projects.push({proj, origins, d:groupDate(all), mod:maxDate(all)});
  }
  projects.sort((a,b)=> orderCmp(a.proj,b.proj,a.d,b.d));
  return projects;
}
function groupRow(cls,key,label,iconName,iconColor,date){
  const isCol = collapsed.has(key);
  const row = document.createElement("button");
  row.className = "row "+cls; row.setAttribute("role","treeitem");
  row.setAttribute("aria-expanded", String(!isCol));
  row.tabIndex = -1;
  row.innerHTML = `<span class="chev">${icon("chevron-down",13,"var(--dim)")}</span>`
    + `<span class="ico">${icon(iconName,13,iconColor)}</span>`
    + `<span class="label">${esc(label)}</span>`
    + rdateHtml(date);
  return row;
}
function renderTree(){
  const root = $("#tree"); root.innerHTML = "";
  const projects = buildTree(treeData || []);
  for(const {proj, origins, mod} of projects){
    const pc = projColor(proj);
    const pGroup = document.createElement("div"); pGroup.className = "group";
    const pKey = "p:"+proj;
    if(collapsed.has(pKey)) pGroup.classList.add("collapsed");
    const pRow = groupRow("proj", pKey, proj, projMeta(proj).icon, pc, mod);
    pRow.onclick = () => toggle(pKey, pGroup, pRow);
    pGroup.appendChild(pRow);
    const pChildren = document.createElement("div"); pChildren.className = "children indent";
    for(const {origin, leaves, mod:omod} of origins){
      const oKey = "o:"+proj+"/"+origin;
      const oGroup = document.createElement("div"); oGroup.className = "group";
      if(collapsed.has(oKey)) oGroup.classList.add("collapsed");
      const oRow = groupRow("origin", oKey, origin, ORIGIN_ICON[origin]||"folder", pc, omod);
      oRow.onclick = () => toggle(oKey, oGroup, oRow);
      oGroup.appendChild(oRow);
      const oChildren = document.createElement("div"); oChildren.className = "children indent";
      for(const m of leaves){
        const leaf = document.createElement("button");
        leaf.className = "row leaf" + (m.id===currentId ? " sel" : "");
        leaf.setAttribute("role","treeitem"); leaf.tabIndex = -1;
        leaf.dataset.id = m.id;
        leaf.innerHTML = `<span class="ico">${icon(typeMeta(m.memory_type).icon,13,typeColor(m.memory_type))}</span>`
          + `<span class="label">${esc(m.title||"(sin título)")}</span>`
          + rdateHtml(m.created_at);
        leaf.onclick = () => navigate("memoria", m.id);
        oChildren.appendChild(leaf);
      }
      oGroup.appendChild(oChildren);
      pChildren.appendChild(oGroup);
    }
    pGroup.appendChild(pChildren);
    root.appendChild(pGroup);
  }
  setRoving();
}
function toggle(key, group, row){
  autoExpanded.delete(key);   // el usuario toma control de este grupo
  if(collapsed.has(key)){ collapsed.delete(key); group.classList.remove("collapsed"); }
  else { collapsed.add(key); group.classList.add("collapsed"); }
  row.setAttribute("aria-expanded", String(!collapsed.has(key)));
  saveCollapsed();
  setRoving();
}

/* roving tabindex + navegación por teclado */
function visibleItems(){
  return [...$("#tree").querySelectorAll(".row")].filter(r => r.offsetParent !== null);
}
function setRoving(){
  const items = visibleItems();
  items.forEach((r,i)=> r.tabIndex = i===0 ? 0 : -1);
}
$("#tree").addEventListener("keydown", e=>{
  const items = visibleItems();
  const cur = document.activeElement;
  let i = items.indexOf(cur);
  if(i<0) return;
  const focus = j => { items.forEach(r=>r.tabIndex=-1); items[j].tabIndex=0; items[j].focus(); };
  if(e.key==="ArrowDown"){ e.preventDefault(); if(i<items.length-1) focus(i+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); if(i>0) focus(i-1); }
  else if(e.key==="Home"){ e.preventDefault(); focus(0); }
  else if(e.key==="End"){ e.preventDefault(); focus(items.length-1); }
  else if(e.key==="Enter"||e.key===" "){ e.preventDefault(); cur.click();
    setTimeout(setRoving,0); }
  else if(e.key==="ArrowLeft"){ if(cur.getAttribute("aria-expanded")==="true"){ e.preventDefault(); cur.click(); } }
  else if(e.key==="ArrowRight"){ if(cur.getAttribute("aria-expanded")==="false"){ e.preventDefault(); cur.click(); } }
});

/* ===== Detalle + historial (cadena de supersession) ===== */
let currentId = null;
const memCache = new Map();
async function getMem(id){
  if(memCache.has(id)) return memCache.get(id);
  const r = await api("/api/memory/"+id);
  memCache.set(id, r); return r;
}
async function walkChain(id){
  // recorre hacia atrás (padres) y hacia delante (hijos) para ordenar las versiones
  const seen = new Set();
  async function back(x, acc){
    const r = await getMem(x); if(!r || !r.memory) return;
    const link = (r.supersession||[]).find(s => s.child===x);
    if(link && !seen.has(link.parent)){ seen.add(link.parent); await back(link.parent, acc); }
    acc.push(x);
  }
  async function fwd(x, acc){
    const r = await getMem(x); if(!r || !r.memory) return;
    const link = (r.supersession||[]).find(s => s.parent===x);
    if(link && !seen.has(link.child)){ seen.add(link.child); acc.push(link.child); await fwd(link.child, acc); }
  }
  const before=[], after=[]; seen.add(id);
  await back(id, before); await fwd(id, after);
  // before incluye id al final; after son descendientes
  return [...before, ...after];
}
// despliega el árbol por la rama de la memoria, la marca y la desplaza a la vista
function revealInTree(m){
  if(!m) return;
  const parts = (m.path||"(sin path)").split("/");
  const proj = parts[0]||"(sin path)", origin = parts[1]||"·";
  const pKey = "p:"+proj, oKey = "o:"+proj+"/"+origin;
  let changed = false;
  if(collapsed.delete(pKey)){ changed = true; autoExpanded.add(pKey); }
  if(collapsed.delete(oKey)){ changed = true; autoExpanded.add(oKey); }
  if(changed) renderTree();   // solo en memoria (no persiste); renderTree ya marca .sel según currentId
  document.querySelectorAll("#tree .leaf").forEach(l=> l.classList.toggle("sel", l.dataset.id===m.id));
  const sel = $("#tree .leaf.sel");
  if(sel) sel.scrollIntoView({block:"nearest"});
}
// vuelve a cerrar lo que abrió el "reveal" (al ir a Inicio); respeta lo abierto a mano
function collapseAuto(){
  if(!autoExpanded.size) return;
  for(const k of autoExpanded) collapsed.add(k);
  autoExpanded.clear(); renderTree();   // restaura el estado del usuario (no persiste)
}
async function openMemory(id, refocus){
  currentId = id;
  const r = await getMem(id);
  if(!r || !r.memory){
    setCrumbs([crumbHome(), {label:"No encontrada"}]);
    $("#detail").innerHTML = `<div class="empty">No encontrada.</div>`; return;
  }
  const m = r.memory;
  revealInTree(m);
  // breadcrumbs: Inicio › proyecto › origen › título
  const parts = (m.path||"").split("/").filter(Boolean);
  const proj = parts[0], origin = parts[1];
  const crumbs = [crumbHome()];
  if(proj)   crumbs.push({label:proj, icon:projMeta(proj).icon, go:()=>{ $("#q").value="/"+proj; $("#q").focus(); doSearch($("#q").value); }});
  if(origin) crumbs.push({label:origin, icon:ORIGIN_ICON[origin]||"folder"});
  crumbs.push({label:m.title||"(sin título)", icon:typeMeta(m.memory_type).icon});
  setCrumbs(crumbs);
  const tc = typeColor(m.memory_type);
  const tags = (m.tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join("");
  const wrap = document.createElement("div"); wrap.className="detail-wrap";
  wrap.innerHTML =
    `<h1 class="d-title">${esc(m.title||"(sin título)")}</h1>`
    + `<div class="d-meta">`
    +   `<span>${esc(m.path||"(sin path)")}</span><span class="sep">·</span>`
    +   `<span class="d-type">${icon(typeMeta(m.memory_type).icon,13,tc)}<span>${esc(m.memory_type||"")}</span></span>`
    +   `<span class="sep">·</span><span>${fmtDate(m.created_at)}</span>`
    +   `<span class="sep">·</span><span title="${esc(m.id)}">id ${esc(String(m.id).slice(0,8))}</span>`
    + `</div>`
    + (tags?`<div class="d-tags">${tags}</div>`:"")
    + `<div class="d-body">${esc(m.content||"")}</div>`
    + `<div class="hist" id="hist"></div>`;
  $("#detail").innerHTML = ""; $("#detail").appendChild(wrap);
  $("#detail").scrollTop = 0;
  renderHistory(id);
}
async function renderHistory(id){
  let chain;
  try { chain = await walkChain(id); } catch(_) { chain = [id]; }
  if(!chain || chain.length<=1){ return; }
  const host = $("#hist"); if(!host) return;
  const rows = await Promise.all(chain.map(getMem));
  const n = chain.length;
  let html = `<div class="hist-head">Historial · supersession<span class="line"></span></div><div class="timeline">`;
  chain.map((cid,idx)=>({cid,idx})).reverse().forEach(({cid,idx})=>{
    const r = rows[idx]; const mm = r&&r.memory;
    const cur = cid===currentId;
    const ver = "v"+(idx+1);
    html += `<button class="ver${cur?" cur":""}" data-id="${cid}">`
      + `<span class="vg"><span class="dot"></span>`
      + `<span>${ver}${cur?"  ·  actual":""}  ·  ${mm?fmtDate(mm.created_at):""}</span></span>`
      + `${icon("chevron-down",13,"var(--dim)")}</button>`;
  });
  html += `</div>`;
  host.innerHTML = html;
  host.querySelectorAll(".ver").forEach(b=> b.onclick = ()=> navigate("memoria", b.dataset.id));
}

/* ===== Estado / cola ===== */
let lastStatus = null, online = false, dataSig = null, refreshing = false;
const fmtLag = s => s==null ? "—" : (s>=1 ? `${s.toFixed(1)} s` : `${(s*1000).toFixed(0)} ms`);
// recarga árbol + vista actual cuando el polling detecta datos nuevos (notas/relaciones)
async function refreshData(){
  if(refreshing) return; refreshing = true;
  try {
    memCache.clear();
    await loadTree();                              // árbol + recientes del inicio
    if(parseHash().view==="memoria") render();     // re-abre la memoria actual (puede haber cambiado)
  } finally { refreshing = false; }
}
async function loadStatus(){
  let s;
  try { s = await api("/api/status"); }
  catch(_) { setHealth(false); if(parseHash().view==="estado") renderEstado(); return; }
  setHealth(true);
  if(treeData===null) loadTree();   // auto-cura: si el árbol nunca cargó (arranque sin conexión), reintenta
  lastStatus = s;
  // firma de cambios estructurales (excluye pendientes_embed: el worker no debe disparar recargas)
  const cc = s.counts || {};
  const sig = `${cc.memory_total}/${cc.memory_current}/${cc.relations}/${cc.tombstones}`;
  const changed = dataSig!==null && sig!==dataSig;
  dataSig = sig;
  if(changed) refreshData();
  const lde = $("#ldeStat"); if(lde) lde.innerHTML = ledeText();
  if(parseHash().view==="estado") renderEstado();
  $("#model").textContent = `modelo: ${s.embed_model||"?"} · ${s.embed_dim||"?"}d`;
  const c=s.counts||{}, q=s.queue||{};
  const lag = fmtLag(q.avg_lag_s);
  const pend = c.pendientes_embed??0;
  $("#sbStats").innerHTML =
    `<span><b>${c.memory_current??"–"}</b> vigentes</span><span class="sep">·</span>`
    + `<span><b>${c.memory_total??"–"}</b> versiones</span><span class="sep">·</span>`
    + `<span><b class="${pend===0?"ok":"warn"}">${pend}</b> sin embed</span><span class="sep">·</span>`
    + `<span>cola ${q.pending||0}/${q.processing||0}/<b class="ok">${q.done||0}</b></span><span class="sep">·</span>`
    + `<span>desfase ${lag}</span><span class="sep">·</span><span>nodo local</span>`;
}
function setHealth(ok){
  online = ok;
  const h=$("#health");
  h.classList.toggle("bad", !ok);
  h.querySelector(".ico").innerHTML = icon(ok?"check":"triangle-alert",12);
  h.querySelector("span:last-child").textContent = ok?"conectado":"sin conexión";
}

/* ===== Búsqueda · quick-open (popover bajo la barra) =====
   texto suelto -> búsqueda híbrida (API). Prefijos: @tipo #tag /proyecto (filtran). */
const pop = () => $("#searchPop");
let popHits=[], activeIdx=-1, searchSeq=0;
function parseQuery(raw){
  const m = raw.match(/^([@#/])(\S*)\s*([\s\S]*)$/);
  if(m) return {kind:{"@":"type","#":"tag","/":"project"}[m[1]], key:m[2].toLowerCase(), text:m[3].trim()};
  return {kind:null, key:"", text:raw};
}
function openPop(){ pop().hidden=false; $("#q").setAttribute("aria-expanded","true"); }
function closePop(){ pop().hidden=true; $("#q").setAttribute("aria-expanded","false"); activeIdx=-1; }
function showRecents(){
  if(!treeData || !treeData.length){ closePop(); return; }
  const rec = [...treeData]
    .sort((a,b)=> String(b.created_at||"").localeCompare(String(a.created_at||"")))
    .slice(0,8);
  renderPop(rec, "Recientes");
}
async function doSearch(raw){
  raw = (raw||"").trim();
  if(!raw){ showRecents(); return; }
  const {kind,key,text} = parseQuery(raw);
  // Comando sin valor confirmado -> muestra SOLO las opciones de ese comando (tipos/tags/proyectos)
  if(kind && !text){
    const values = cmdValues(kind);
    const exact = key!=="" && values.some(([v])=> String(v).toLowerCase()===key);
    if(!exact){
      renderCmdOptions(kind, values
        .filter(([v])=> String(v).toLowerCase().startsWith(key))
        .sort((a,b)=> b[1]-a[1] || String(a[0]).localeCompare(String(b[0]))));
      return;
    }
  }
  const seq = ++searchSeq;
  let hits = [];
  if(text){
    const r = await api(`/api/search?q=${encodeURIComponent(text)}&semantic=true`);
    if(seq!==searchSeq) return;            // descarta respuestas viejas
    hits = r.hits||[];
  } else if(kind){
    hits = (treeData||[]).map(m=>({...m})); // solo filtro -> lista local del árbol
  } else { closePop(); return; }
  if(kind==="type")    hits = hits.filter(h=>String(h.memory_type||"").toLowerCase().startsWith(key));
  else if(kind==="project") hits = hits.filter(h=>String(h.path||"").toLowerCase().startsWith(key));
  else if(kind==="tag")     hits = hits.filter(h=>(h.tags||[]).some(t=>String(t).toLowerCase().includes(key)));
  renderPop(hits.slice(0,50));
}
function renderPop(hits, label){
  popHits = hits;
  if(!hits.length){ pop().innerHTML = `<div class="pop-hint">Sin resultados.</div>`; activeIdx=-1; openPop(); return; }
  activeIdx = 0;
  pop().innerHTML = (label?`<div class="pop-hint">${esc(label)}</div>`:"")
    + hits.map((h,i)=>
    `<button class="qitem${i===0?" active":""}" data-i="${i}" role="option">`
    + `<span class="ico">${icon(typeMeta(h.memory_type).icon,14,typeColor(h.memory_type))}</span>`
    + `<span class="qt">${esc(h.title||"(sin título)")}</span>`
    + `<span class="qp">${esc(h.path||"")}</span></button>`).join("");
  pop().querySelectorAll(".qitem").forEach(b=> b.onclick = ()=> chooseItem(+b.dataset.i));
  openPop();
}
/* valores disponibles de cada comando (con conteo) a partir del árbol */
function cmdValues(kind){
  const m = new Map();
  for(const x of treeData||[]){
    if(kind==="type"){ const v=x.memory_type||"?"; m.set(v,(m.get(v)||0)+1); }
    else if(kind==="project"){ const v=(x.path||"(sin path)").split("/")[0]; m.set(v,(m.get(v)||0)+1); }
    else if(kind==="tag"){ for(const t of (x.tags||[])) m.set(t,(m.get(t)||0)+1); }
  }
  return [...m.entries()];
}
const CMD_PREFIX = {type:"@", tag:"#", project:"/"};
function renderCmdOptions(kind, opts){
  const head = {type:"Tipos", tag:"Etiquetas", project:"Proyectos"}[kind];
  popHits = opts.map(([v,n])=> ({cmd:true, kind, value:String(v), n}));
  if(!popHits.length){ pop().innerHTML = `<div class="pop-hint">Sin ${head.toLowerCase()}.</div>`; activeIdx=-1; openPop(); return; }
  activeIdx = 0;
  pop().innerHTML = `<div class="pop-hint">${head}</div>` + popHits.map((o,i)=>{
    let ico;
    if(kind==="type")    ico = icon(typeMeta(o.value).icon,14,typeColor(o.value));
    else if(kind==="project") ico = icon(projMeta(o.value).icon,14,projColor(o.value));
    else ico = icon("hash",14,"var(--dim)");
    return `<button class="qitem${i===0?" active":""}" data-i="${i}" role="option">`
      + `<span class="ico">${ico}</span>`
      + `<span class="qt">${CMD_PREFIX[kind]}${esc(o.value)}</span>`
      + `<span class="qp">${o.n}</span></button>`;
  }).join("");
  pop().querySelectorAll(".qitem").forEach(b=> b.onclick = ()=> chooseItem(+b.dataset.i));
  openPop();
}
function setActive(i){
  const items = [...pop().querySelectorAll(".qitem")]; if(!items.length) return;
  activeIdx = (i+items.length)%items.length;
  items.forEach((b,j)=> b.classList.toggle("active", j===activeIdx));
  items[activeIdx].scrollIntoView({block:"nearest"});
}
function chooseItem(i){
  const h = popHits[i]; if(!h) return;
  if(h.cmd){                                   // elegir un valor de comando -> filtra por él
    $("#q").value = CMD_PREFIX[h.kind] + h.value;
    doSearch($("#q").value);
    return;
  }
  closePop(); navigate("memoria", h.id);
}

/* ===== Util ===== */
function esc(s){ return String(s??"").replace(/[<>&]/g, c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c])); }

/* ===== Router de vistas (área central) =====
   Inicio por defecto; Memoria al elegir en el árbol; Grafo/Nueva/Estado/Ajustes.
   El estado vive en location.hash para sobrevivir a recargas (#/inicio, #/m/<id>…). */
const VIEWS = ["inicio","grafo","nueva","estado","ajustes"];
const RAIL = [
  {view:"inicio", icon:"house",      label:"Inicio"},
  {view:"grafo",  icon:"share-2",    label:"Grafo del conocimiento"},
  {view:"nueva",  icon:"square-pen", label:"Nueva memoria"},
  {view:"estado", icon:"activity",   label:"Estado del nodo"},
];
const RAIL_BOTTOM = [{view:"ajustes", icon:"settings", label:"Ajustes"}];
function buildRail(){
  const mk = r => `<button class="rail-item" data-view="${r.view}" title="${esc(r.label)}" `
    + `aria-label="${esc(r.label)}">${icon(r.icon,20)}</button>`;
  $("#rail").innerHTML = RAIL.map(mk).join("")
    + `<span class="rail-spacer"></span>`
    + `<button class="rail-item" id="railTheme"></button>`
    + RAIL_BOTTOM.map(mk).join("");
  $("#rail").querySelectorAll(".rail-item[data-view]").forEach(b=> b.onclick = ()=> navigate(b.dataset.view));
  $("#railTheme").onclick = ()=> applyTheme(theme==="dark" ? "light" : "dark", true);
  updateThemeBtn();
}
function updateThemeBtn(){
  const tb = $("#railTheme"); if(!tb) return;
  const toLight = theme==="dark";                       // en oscuro -> botón ofrece pasar a claro
  tb.innerHTML = icon(toLight ? "sun" : "moon", 20);
  const lbl = toLight ? "Cambiar a tema claro" : "Cambiar a tema oscuro";
  tb.title = lbl; tb.setAttribute("aria-label", lbl);
}
function parseHash(){
  const h = location.hash.replace(/^#\/?/,"");
  if(h.startsWith("m/")) return {view:"memoria", id:h.slice(2)};
  return {view: VIEWS.includes(h)?h:"inicio", id:null};
}
function navigate(view, id){
  const hash = (view==="memoria" && id) ? `#/m/${id}` : `#/${view}`;
  if(location.hash===hash) render();   // mismo destino -> re-render explícito
  else location.hash = hash;           // distinto -> hashchange dispara render
}
function render(){
  const r = parseHash();
  document.querySelectorAll(".rail-item").forEach(b=> b.classList.toggle("on", b.dataset.view===r.view));
  if(r.view!=="memoria"){
    currentId = null;
    document.querySelectorAll("#tree .leaf.sel").forEach(l=> l.classList.remove("sel"));
  }
  if(r.view==="memoria" && r.id) openMemory(r.id);
  else if(r.view==="inicio") renderInicio();
  else if(r.view==="estado") renderEstado();
  else renderStub(r.view);
}
/* breadcrumbs: items = [{label, icon?, go?}]; el último es el actual (no clicable) */
function setCrumbs(items){
  const el = $("#crumbs"); if(!el) return;
  el.innerHTML = items.map((it,i)=>{
    const last = i===items.length-1;
    const inner = (it.icon ? icon(it.icon,13,"currentColor") : "") + `<span>${esc(it.label)}</span>`;
    const node = (it.go && !last)
      ? `<button class="crumb" data-i="${i}">${inner}</button>`
      : `<span class="crumb${last?" cur":""}">${inner}</span>`;
    return node + (last ? "" : `<span class="crumb-sep">${icon("chevron-right",13,"var(--border)")}</span>`);
  }).join("");
  el.querySelectorAll(".crumb[data-i]").forEach(b=>{
    const f = items[+b.dataset.i].go; if(f) b.onclick = f;
  });
}
const crumbHome = () => ({label:"Inicio", icon:"house", go:()=> navigate("inicio")});

/* ===== Inicio (dashboard) ===== */
function greeting(){
  const h = new Date().getHours();
  return h<6 ? "Buenas noches" : h<12 ? "Buenos días" : h<20 ? "Buenas tardes" : "Buenas noches";
}
function ledeText(){
  const c = (lastStatus && lastStatus.counts) || {};
  const projs = new Set((treeData||[]).map(m=>(m.path||"(sin path)").split("/")[0])).size;
  const vig = c.memory_current!=null ? c.memory_current : (treeData ? treeData.length : "–");
  const ver = c.memory_total!=null ? c.memory_total : "–";
  return `<b>${vig}</b> memorias vigentes · <b>${projs}</b> proyectos · <b>${ver}</b> versiones`;
}
function renderInicio(){
  collapseAuto();   // cierra de nuevo lo que abrió el "reveal"
  setCrumbs([{label:"Inicio", icon:"house"}]);
  const rec = [...(treeData||[])]
    .sort((a,b)=> String(b.created_at||"").localeCompare(String(a.created_at||"")))
    .slice(0,8);
  const list = rec.length ? rec.map(m=>

      + `<span class="ri-main"><span class="ri-title">${esc(m.title||"(sin título)")}</span>`
      +   `<span class="ri-path">${esc(m.path||"(sin path)")}</span></span>`
      + `<span class="ri-date">${fmtShort(m.created_at)}</span></button>`).join("")

  el.innerHTML =
    `<div class="inicio">`

    +   `<div class="recent-list">${list}</div></section>`
    + `</div>`;

  el.querySelectorAll(".recent-item").forEach(b=> b.onclick = ()=> navigate("memoria", b.dataset.id));
}

/* ===== Estado del nodo (diagnóstico, datos de /api/status, en vivo) ===== */
// agregaciones sobre las notas (treeData) para los gráficos
const aggBy = (rows,fn)=>{ const m=new Map();
  for(const r of rows){ const k=fn(r); m.set(k,(m.get(k)||0)+1); }
  return [...m.entries()].sort((a,b)=> b[1]-a[1]); };
function barChart(title, headIcon, entries, colorFn, iconFn){
  const max = Math.max(1, ...entries.map(e=>e[1]));
  const rows = entries.map(([k,n])=>{
    const col = colorFn ? colorFn(k) : "var(--accent)";
    const ic  = iconFn ? `<span class="ico">${icon(iconFn(k),13,col)}</span>` : "";
    return `<div class="bar-row"><span class="bar-label">${ic}<span>${esc(k)}</span></span>`
      + `<span class="bar-track"><span class="bar-fill" style="width:${Math.round(n/max*100)}%;background:${col}"></span></span>`
      + `<span class="bar-val">${n}</span></div>`;
  }).join("");
  return `<div class="chart"><h3>${icon(headIcon,13,"var(--dim)")}<span>${esc(title)}</span></h3>`
    + (rows || `<div class="empty" style="padding:0">Sin datos.</div>`) + `</div>`;
}
function activityChart(rows, days){
  const today = new Date(); today.setHours(0,0,0,0);
  const buckets = [], idx = new Map();
  for(let i=days-1;i>=0;i--){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    idx.set(key, buckets.length); buckets.push({d, key, n:0});
  }
  for(const r of rows){ if(!r.created_at) continue;
    const k = String(r.created_at).slice(0,10); if(idx.has(k)) buckets[idx.get(k)].n++; }
  const total = buckets.reduce((a,b)=> a+b.n, 0);
  const max = Math.max(1, ...buckets.map(b=>b.n));
  const cols = buckets.map((b,i)=>{
    const h = b.n ? Math.max(Math.round(b.n/max*100),6) : 0;
    const isToday = i===buckets.length-1;
    return `<div class="day${b.n?"":" empty"}" title="${b.d.getDate()}/${b.d.getMonth()+1}: ${b.n} memoria(s)">`
      + `<span class="n">${b.n||""}</span>`
      + `<span class="barwrap"><span class="bar" style="height:${h}%"></span></span>`
      + `<span class="x">${isToday?"hoy":b.d.getDate()}</span></div>`;
  }).join("");
  return `<div class="chart"><h3>${icon("activity",13,"var(--dim)")}<span>Memorias por día · últimos ${days} días</span>`
    + `<span class="chart-sub">${total} en el periodo</span></h3>`
    + `<div class="spark">${cols}</div></div>`;
}
function renderEstado(){
  setCrumbs([crumbHome(), {label:"Estado del nodo", icon:"activity"}]);
  const s = lastStatus || {};
  const c = s.counts || {}, q = s.queue || {};
  const tot = c.memory_total ?? 0, pend = c.pendientes_embed ?? 0;
  const emb = tot - pend, pct = tot>0 ? Math.round(emb/tot*100) : 0;
  const notes = treeData || [];
  const projs = new Set(notes.map(m=>(m.path||"(sin path)").split("/")[0])).size;
  const tile = (k,v,cls)=> `<div class="est-tile"><span class="v${cls?" "+cls:""}">${v}</span>`
    + `<span class="k">${esc(k)}</span></div>`;
  const el = $("#detail");
  el.innerHTML =
    `<div class="estado">`
    + `<div class="est-conn">`
    +   `<span class="est-dot${online?"":" bad"}"></span>`
    +   `<span class="est-state">${online?"Conectado":"Sin conexión"}</span>`
    +   `<span class="est-sub">nodo local · ${esc(s.embed_model||"modelo ?")} · ${s.embed_dim||"?"} dimensiones</span>`
    + `</div>`
    + `<section class="est-sec"><div class="est-grid">`
    +     tile("Vigentes", c.memory_current ?? "–")
    +     tile("Versiones", tot || "–")
    +     tile("Relaciones", c.relations ?? "–")
    +     tile("Proyectos", projs || "–")
    +   `</div></section>`
    + `<section class="est-sec"><div class="charts">`
    +     barChart("Memorias por tipo", "eye",
              aggBy(notes, m=>m.memory_type||"?"), typeColor, t=>typeMeta(t).icon)
    +     barChart("Memorias por proyecto", "folder",
              aggBy(notes, m=>(m.path||"(sin path)").split("/")[0]).slice(0,8), projColor, p=>projMeta(p).icon)
    +   `</div></section>`
    + `<section class="est-sec">${activityChart(notes, 14)}</section>`
    + `<section class="est-sec"><div class="est-sec-head">${icon("activity",13,"var(--dim)")}<span>Salud del nodo</span></div>`
    +   `<div class="est-emb"><div class="est-bar"><i style="width:${pct}%"></i></div>`
    +     `<div class="est-emb-meta"><span class="v${pct===100?" ok":""}">Embeddings ${tot?pct+" %":"–"}</span>`
    +       `<span class="k">${emb}/${tot} embebidas · ${pend} sin embeber</span></div></div>`
    +   `<div class="est-grid" style="margin-top:12px">`
    +     tile("Cola pendiente", q.pending ?? "–", (q.pending??0)>0 ? "warn" : null)
    +     tile("Procesando", q.processing ?? "–")
    +     tile("Completadas", q.done ?? "–", "ok")
    +     tile("Errores", q.error ?? "–", (q.error??0)>0 ? "warn" : null)
    +     tile("Desfase medio", fmtLag(q.avg_lag_s))
    +   `</div></section>`
    + `</div>`;
  el.scrollTop = 0;
  if(!lastStatus) loadStatus();   // primera vez: pide datos ya
}

/* ===== Vistas-esqueleto (próximamente) ===== */
const STUB = {
  grafo:  {icon:"share-2",    title:"Grafo del conocimiento", text:"Relaciones explícitas y vecinos semánticos entre memorias. Llegará en el Paso 5.4."},
  nueva:  {icon:"square-pen", title:"Nueva memoria",          text:"Crear y editar memorias con editor Markdown, sobre el CRUD ADD-only ya disponible. Llegará en el Paso 5.3."},
  estado: {icon:"activity",   title:"Estado del nodo",        text:"Salud, cola de embeddings y sincronización en detalle. De momento, el resumen vive en la barra de estado."},
  ajustes:{icon:"settings",   title:"Ajustes",                text:"Tema, modelo de embeddings y conexión. De momento, el tema se cambia en la barra de estado."},
};
function renderStub(view){
  const s = STUB[view] || STUB.grafo;
  setCrumbs([crumbHome(), {label:s.title, icon:s.icon}]);
  const el = $("#detail");
  el.innerHTML = `<div class="stub"><span class="si">${icon(s.icon,40,"var(--dim)")}</span>`
    + `<h2>${esc(s.title)}</h2><p>${esc(s.text)}</p>`
    + `<span class="soon">Próximamente</span></div>`;
  el.scrollTop = 0;
}

/* ===== Wiring ===== */
$("#searchIco").innerHTML = icon("search",14,"var(--dim)");
$("#refresh").innerHTML = icon("refresh",14);
$("#refresh").onclick = async ()=> { memCache.clear(); await loadTree(); loadStatus(); render(); };
$("#brand").onclick = ()=> navigate("inicio");
const SORT_LABEL = {"az":"A–Z","date-desc":"Nuevas","date-asc":"Antiguas"};
const SORT_NEXT = {"az":"date-desc","date-desc":"date-asc","date-asc":"az"};
function updateSortBtn(){ $("#sortBtn").innerHTML = icon("arrow-up-down",13,"currentColor")+`<span>${SORT_LABEL[sortMode]||"A–Z"}</span>`; }
$("#sortBtn").onclick = ()=>{ sortMode = SORT_NEXT[sortMode]||"az"; localStorage.setItem("naeth-sort",sortMode); updateSortBtn(); renderTree(); };
updateSortBtn();
let searchT;
$("#q").addEventListener("input", e=>{ clearTimeout(searchT);
  searchT = setTimeout(()=> doSearch(e.target.value), 200); });
$("#q").addEventListener("focus", ()=>{ if(!$("#q").value.trim()) showRecents(); });
$("#q").addEventListener("keydown", e=>{
  if(pop().hidden) return;
  if(e.key==="ArrowDown"){ e.preventDefault(); setActive(activeIdx+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); setActive(activeIdx-1); }
  else if(e.key==="Enter"){ e.preventDefault(); if(activeIdx>=0) chooseItem(activeIdx); }
  else if(e.key==="Escape"){ e.preventDefault(); closePop(); $("#q").blur(); }
});
$("#searchForm").addEventListener("submit", e=>{ e.preventDefault(); if(activeIdx>=0) chooseItem(activeIdx); });
// el popover no debe cerrar el global ni robar el foco del input al pulsar (ratón/táctil)
$("#searchPop").addEventListener("mousedown", e=> e.preventDefault());
$("#searchPop").addEventListener("click", e=> e.stopPropagation());
document.addEventListener("click", e=>{ if(!e.target.closest(".search")) closePop(); });
document.addEventListener("keydown", e=>{
  const k = e.key.toLowerCase();
  if((e.ctrlKey||e.metaKey) && k==="p"){            // Ctrl/Cmd+P -> abrir buscador
    e.preventDefault(); $("#q").focus();
    if(!$("#q").value.trim()) showRecents();
    return;
  }
  if(k==="/" && document.activeElement!==$("#q") &&
     !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)){
    e.preventDefault(); $("#q").focus();
  }
});

/* ===== Sidebar redimensionable (arrastrar, persistente) ===== */
(function(){
  const MIN=200, MAX=560, rz=$("#resizer");
  const saved=parseInt(localStorage.getItem("naeth-side")||"",10);
  if(saved) document.documentElement.style.setProperty("--side-w", Math.max(MIN,Math.min(MAX,saved))+"px");
  let drag=false;
  rz.addEventListener("mousedown", e=>{ drag=true; rz.classList.add("drag");
    document.body.style.userSelect="none"; e.preventDefault(); });
  window.addEventListener("mousemove", e=>{ if(!drag) return;
    const w=Math.max(MIN,Math.min(MAX,e.clientX));
    document.documentElement.style.setProperty("--side-w", w+"px"); });
  window.addEventListener("mouseup", ()=>{ if(!drag) return; drag=false;
    rz.classList.remove("drag"); document.body.style.userSelect="";
    const w=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--side-w"),10);
    if(w) localStorage.setItem("naeth-side", String(w)); });
})();

buildRail();
window.addEventListener("hashchange", render);
// datos e intervalo PRIMERO: aunque el primer pintado fallara, el árbol/estado igual cargan
loadTree();
loadStatus();
setInterval(loadStatus, 4000);
applyTheme(theme, false);   // aplica tema y pinta la vista actual del hash
</script>
</body>
</html>
